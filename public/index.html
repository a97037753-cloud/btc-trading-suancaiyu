<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC 量化交易信号系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #0f3460;
            margin-bottom: 30px;
            background: rgba(15, 52, 96, 0.3);
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5em;
            color: #00d4ff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, #00d95f, #00a040);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 217, 95, 0.6);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .status-badge.active {
            background: #00d95f;
            color: white;
            box-shadow: 0 0 15px rgba(0, 217, 95, 0.5);
        }

        .status-badge.loading {
            background: #ff9500;
            color: white;
            box-shadow: 0 0 15px rgba(255, 149, 0, 0.5);
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(30, 50, 80, 0.6);
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 1.3em;
            color: #00d4ff;
            margin-bottom: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-badge {
            display: inline-block;
            background: #0f3460;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #00d4ff;
        }

        .signal-display {
            font-size: 2.5em;
            font-weight: bold;
            margin: 20px 0;
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
        }

        .signal-buy {
            color: #00d95f;
            text-shadow: 0 0 20px rgba(0, 217, 95, 0.6);
            border: 2px solid #00d95f;
        }

        .signal-sell {
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.6);
            border: 2px solid #ff4444;
        }

        .signal-wait {
            color: #888;
            text-shadow: none;
            border: 2px solid #444;
        }

        .confidence {
            display: flex;
            align-items: center;
            margin: 15px 0;
            gap: 10px;
        }

        .confidence-bar {
            flex: 1;
            height: 24px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #0f3460;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ffaa00, #00d95f);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            transition: width 0.3s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            border-left: 3px solid #00d4ff;
        }

        .stat-value {
            font-size: 1.4em;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 0.85em;
            color: #888;
        }

        .reasons {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 0.95em;
        }

        .reason-item {
            color: #00d4ff;
            margin: 5px 0;
            padding-left: 15px;
            position: relative;
        }

        .reason-item:before {
            content: "▸";
            position: absolute;
            left: 0;
            color: #00d4ff;
        }

        .synthesis-card {
            grid-column: 1 / -1;
            background: rgba(0, 50, 100, 0.4);
            border: 2px solid #00d4ff;
        }

        .synthesis-signal {
            font-size: 3em;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            letter-spacing: 3px;
        }

        .synthesis-signal.strong-buy {
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
        }

        .synthesis-signal.strong-sell {
            color: #ff3333;
            text-shadow: 0 0 30px rgba(255, 51, 51, 0.8);
        }

        .synthesis-signal.buy {
            color: #00d95f;
            text-shadow: 0 0 20px rgba(0, 217, 95, 0.6);
        }

        .synthesis-signal.sell {
            color: #ff6666;
            text-shadow: 0 0 20px rgba(255, 102, 102, 0.6);
        }

        .history-section {
            background: rgba(30, 50, 80, 0.6);
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
        }

        .history-title {
            font-size: 1.3em;
            color: #00d4ff;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #0f3460;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .history-time {
            color: #888;
            font-size: 0.9em;
            min-width: 150px;
        }

        .history-signal {
            font-weight: bold;
            min-width: 100px;
        }

        .history-signal.buy {
            color: #00d95f;
        }

        .history-signal.sell {
            color: #ff6666;
        }

        .history-confidence {
            color: #888;
            font-size: 0.9em;
            min-width: 80px;
            text-align: right;
        }

        .price-display {
            font-size: 2em;
            font-weight: bold;
            color: #00d4ff;
            margin: 10px 0;
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .success {
            background: rgba(0, 217, 95, 0.2);
            border: 1px solid #00d95f;
            color: #88ff88;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .signal-display {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 BTC 量化交易信号系统</h1>
            <p class="subtitle">双策略综合确认 | 5分钟、10分钟、15分钟 实时分析</p>
            <div style="margin-top: 15px;">
                <span class="status-badge" id="status">初始化中...</span>
                <span style="margin-left: 15px; color: #888;" id="timestamp"></span>
            </div>
        </header>

        <div class="controls">
            <button class="btn-primary" onclick="analyzeNow()">🔄 立即分析</button>
            <button class="btn-success" onclick="toggleAutoUpdate()">⏱️ <span id="autoText">开始自动更新</span></button>
            <button class="btn-primary" onclick="location.reload()">🔁 刷新页面</button>
        </div>

        <div id="analysis-container" class="content-grid">
            <!-- 动态生成的分析卡片 -->
        </div>

        <div class="history-section">
            <h2 class="history-title">📈 信号历史记录</h2>
            <div class="history-list" id="history-list">
                <p style="color: #888;">暂无历史记录</p>
            </div>
        </div>
    </div>

    <script>
        const INTERVALS = ['5m', '10m', '15m'];
        let autoUpdateEnabled = false;
        let updateInterval = null;
        let lastSignalTime = null;

        /**
         * 立即分析
         */
        async function analyzeNow() {
            updateStatus('分析中...', 'loading');
            try {
                const response = await fetch('/api/analysis');
                const data = await response.json();
                
                if (data.success) {
                    displayAnalysis(data);
                    updateStatus('分析完成 ✓', 'active');
                    updateTimestamp();
                } else {
                    showError('分析失败: ' + data.error);
                }
            } catch (error) {
                showError('请求失败: ' + error.message);
                updateStatus('错误', 'error');
            }
        }

        /**
         * 显示分析结果
         */
        function displayAnalysis(data) {
            const container = document.getElementById('analysis-container');
            container.innerHTML = '';

            // 显示各时间框架的分析
            INTERVALS.forEach(interval => {
                if (data.intervals[interval]) {
                    container.appendChild(
                        createIntervalCard(interval, data.intervals[interval])
                    );
                }
            });

            // 显示综合信号
            container.appendChild(createSynthesisCard(data.synthesis));

            // 更新历史记录
            if (data.signalHistory && data.signalHistory.length > 0) {
                updateHistory(data.signalHistory);
            }
        }

        /**
         * 创建时间框架卡片
         */
        function createIntervalCard(interval, analysisData) {
            const card = document.createElement('div');
            card.className = 'card';

            const signal = analysisData.signal;
            const analysis = analysisData.analysis;

            let signalClass = 'signal-wait';
            if (signal.type.includes('BUY')) signalClass = 'signal-buy';
            if (signal.type.includes('SELL')) signalClass = 'signal-sell';

            let signalEmoji = '⏸️';
            if (signal.type.includes('BUY')) signalEmoji = '🟢';
            if (signal.type.includes('SELL')) signalEmoji = '🔴';

            card.innerHTML = `
                <div class="card-title">
                    <span class="time-badge">${interval}</span>
                    <span id="title-${interval}"></span>
                </div>
                <div class="price-display">¥ ${analysisData.price.toFixed(2)}</div>
                <div class="signal-display ${signalClass}" id="signal-${interval}">
                    ${signalEmoji} ${signal.type}
                </div>
                <div class="confidence">
                    <span>信心度:</span>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${signal.confidence}%">
                            ${signal.confidence}%
                        </div>
                    </div>
                </div>
                ${
                    signal.reasons && signal.reasons.length > 0 
                        ? `<div class="reasons">
                            ${signal.reasons.map(r => `<div class="reason-item">${r}</div>`).join('')}
                          </div>`
                        : ''
                }
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value">${signal.emaStatus.price.toFixed(2)}</div>
                        <div class="stat-label">当前价格</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${signal.kdjStatus.k.toFixed(1)}</div>
                        <div class="stat-label">K值</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${signal.kdjStatus.d.toFixed(1)}</div>
                        <div class="stat-label">D值</div>
                    </div>
                </div>
            `;

            return card;
        }

        /**
         * 创建综合信号卡片
         */
        function createSynthesisCard(synthesis) {
            const card = document.createElement('div');
            card.className = 'card synthesis-card';

            let signalClass = '';
            if (synthesis.type === 'STRONG_BUY') signalClass = 'strong-buy';
            else if (synthesis.type === 'STRONG_SELL') signalClass = 'strong-sell';
            else if (synthesis.type === 'BUY') signalClass = 'buy';
            else if (synthesis.type === 'SELL') signalClass = 'sell';

            card.innerHTML = `
                <div class="card-title">🎯 综合信号</div>
                <div class="synthesis-signal ${signalClass}">${synthesis.type}</div>
                <div style="text-align: center; font-size: 1.3em; color: #00d4ff; margin: 10px 0;">
                    信心度: ${synthesis.confidence}%
                </div>
                ${synthesis.reasoning.map(r => `<div class="reason-item" style="color: #888; margin: 5px 0; padding-left: 15px;">${r}</div>`).join('')}
                <div class="stats-grid" style="margin-top: 15px;">
                    <div class="stat-item">
                        <div class="stat-value">${synthesis.details.buySignals}</div>
                        <div class="stat-label">买入信号</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${synthesis.details.sellSignals}</div>
                        <div class="stat-label">卖出信号</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${synthesis.details.strongBuy}</div>
                        <div class="stat-label">强买</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${synthesis.details.strongSell}</div>
                        <div class="stat-label">强卖</div>
                    </div>
                </div>
            `;

            return card;
        }

        /**
         * 更新历史记录
         */
        function updateHistory(history) {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                
                const signalClass = item.signal.includes('BUY') ? 'buy' : 'sell';
                const signalEmoji = item.signal.includes('BUY') ? '🟢' : '🔴';

                div.innerHTML = `
                    <span class="history-time">${item.timestamp}</span>
                    <span class="history-signal ${signalClass}">${signalEmoji} ${item.signal}</span>
                    <span class="history-confidence">信心度: ${item.confidence}%</span>
                `;

                historyList.appendChild(div);
            });
        }

        /**
         * 切换自动更新
         */
        function toggleAutoUpdate() {
            autoUpdateEnabled = !autoUpdateEnabled;
            const btn = document.querySelector('.btn-success');
            const text = document.getElementById('autoText');

            if (autoUpdateEnabled) {
                text.textContent = '停止自动更新';
                btn.style.background = 'linear-gradient(135deg, #ff6666, #cc0000)';
                updateInterval = setInterval(analyzeNow, 30000); // 每30秒
                analyzeNow(); // 立即分析一次
            } else {
                text.textContent = '开始自动更新';
                btn.style.background = 'linear-gradient(135deg, #00d95f, #00a040)';
                clearInterval(updateInterval);
            }
        }

        /**
         * 更新状态
         */
        function updateStatus(text, status) {
            const badge = document.getElementById('status');
            badge.textContent = text;
            badge.className = 'status-badge';
            if (status === 'active') badge.classList.add('active');
            if (status === 'loading') badge.classList.add('loading');
        }

        /**
         * 更新时间戳
         */
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').textContent = 
                `最后更新: ${now.toLocaleString('zh-CN')}`;
        }

        /**
         * 显示错误
         */
        function showError(message) {
            const container = document.getElementById('analysis-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = '❌ ' + message;
            container.innerHTML = '';
            container.appendChild(errorDiv);
        }

        // 页面加载时立即分析
        window.addEventListener('load', () => {
            setTimeout(analyzeNow, 500);
        });

        // 每10秒更新时间戳
        setInterval(updateTimestamp, 10000);
    </script>
</body>
</html>
